name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Stats SVGs
        run: |
          # Fetch Main Stats
          curl -s -o github-stats.svg "https://github-readme-stats.vercel.app/api?username=gourabanandad&show_icons=true&theme=radical&hide_border=true&include_all_commits=true"
          
          # Fetch Top Languages
          curl -s -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs?username=gourabanandad&show_icons=true&locale=en&layout=compact&theme=radical&hide_border=true"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-stats.svg top-langs.svg
          git commit -m "Auto-update GitHub stats" || echo "No changes to commit"
          git push