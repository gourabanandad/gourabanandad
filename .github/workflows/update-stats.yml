name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight UTC
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Main Stats
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=gourabanandad&show_icons=true&theme=radical&hide_border=true&include_all_commits=true
          path: github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=gourabanandad&show_icons=true&locale=en&layout=compact&theme=radical&hide_border=true
          path: top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-stats.svg top-langs.svg
          git commit -m "Auto-update GitHub stats via Marketplace Action" || echo "No changes to commit"
          git push